<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Скачки — Mini App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b1724;
      font-family: Arial, sans-serif;
      touch-action: none;
    }
    #game {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 10;
      background: rgba(0,0,0,.62);
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }
    .dialog {
      width: min(360px, 92vw);
      background: #12263a;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 18px;
      color: #fff;
      padding: 18px;
      box-shadow: 0 18px 50px rgba(0,0,0,.35);
    }
    .dialog h3 { margin: 0 0 12px; }
    .dialog ol { text-align: left; padding-left: 24px; }
    .dialog button {
      width: 100%;
      margin-top: 12px;
      padding: 12px 16px;
      border: 0;
      border-radius: 12px;
      background: #1e88e5;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
    }
    #fatal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 20;
      background: #0b1724;
      color: #fff;
      padding: 20px;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }
    #fatal pre {
      white-space: pre-wrap;
      background: rgba(255,255,255,.08);
      padding: 12px;
      border-radius: 12px;
      font-size: 12px;
    }
  </style>
  <script>
    window.addEventListener('error', function (event) {
      const fatal = document.getElementById('fatal');
      if (fatal) {
        fatal.style.display = 'block';
        fatal.innerHTML = '<h2>Ошибка запуска</h2><p>Скопируйте текст ниже и пришлите мне:</p><pre>' +
          String(event.message || 'Unknown error') + '\n' +
          String(event.filename || '') + ':' + String(event.lineno || '') + ':' + String(event.colno || '') +
          '</pre>';
      }
    });
  </script>
  <script src="./phaser.min.js"></script>
</head>
<body>
  <div id="game"></div>
  <div id="overlay"></div>
  <div id="fatal"></div>

<script>
(function () {
  if (window.Telegram && window.Telegram.WebApp) {
    try {
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();
      window.Telegram.WebApp.disableVerticalSwipes?.();
    } catch (e) {}
  }
})();

if (!window.Phaser) {
  const fatal = document.getElementById('fatal');
  fatal.style.display = 'block';
  fatal.innerHTML = '<h2>Phaser не загрузился</h2><p>Проверьте, что настоящий файл <b>phaser.min.js</b> лежит рядом с index.html в корне репозитория.</p>';
  throw new Error('Phaser is not loaded');
}

const W = window.innerWidth || 390;
const H = window.innerHeight || 740;

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

const TEMPERAMENTS = ['Смелая', 'Пугливая', 'Упрямая', 'Быстрая', 'Ночная'];

function createHorse(name) {
  return {
    id: Date.now() + Math.random().toString(36).slice(2, 8),
    name,
    speed: randInt(52, 78),
    stamina: randInt(52, 78),
    acceleration: randInt(52, 78),
    agility: randInt(45, 75),
    power: randInt(45, 75),
    intelligence: randInt(45, 75),
    temperament: TEMPERAMENTS[randInt(0, TEMPERAMENTS.length - 1)],
    potential: 100,
    energy: 100
  };
}

let horses = [
  createHorse('Буран'),
  createHorse('Молния'),
  createHorse('Ветерок')
];

let raceResults = [];

class PreloadScene extends Phaser.Scene {
  constructor() {
    super('PreloadScene');
  }

  preload() {
    const cx = this.scale.width / 2;
    const cy = this.scale.height / 2;
    this.add.text(cx, cy - 20, 'Загрузка...', {
      fontFamily: 'Arial', fontSize: '22px', color: '#ffffff'
    }).setOrigin(0.5);

    this.load.on('loaderror', (file) => {
      const fatal = document.getElementById('fatal');
      fatal.style.display = 'block';
      fatal.innerHTML = '<h2>Не загрузился ресурс</h2><p>Проверьте файл в репозитории:</p><pre>' + file.src + '</pre>';
    });

    this.load.spritesheet('horse_run', './horse_run_cycle.png', {
      frameWidth: 82,
      frameHeight: 66
    });
    this.load.image('horse_icon', './horse_icon.png');
    this.load.audio('beep', './beep.wav');
  }

  create() {
    this.anims.create({
      key: 'run',
      frames: this.anims.generateFrameNumbers('horse_run', { start: 0, end: 4 }),
      frameRate: 10,
      repeat: -1
    });
    this.scene.start('StableScene');
  }
}

class StableScene extends Phaser.Scene {
  constructor() {
    super('StableScene');
  }

  create() {
    this.cameras.main.setBackgroundColor('#0b1724');
    this.renderStable();
  }

  renderStable() {
    this.children.removeAll(true);

    const w = this.scale.width;
    const h = this.scale.height;

    this.add.rectangle(0, 0, w, 88, 0x10243a).setOrigin(0, 0);
    this.add.text(w / 2, 28, 'СКАЧКИ', {
      fontFamily: 'Arial', fontSize: '26px', fontStyle: 'bold', color: '#ffffff'
    }).setOrigin(0.5);
    this.add.text(w / 2, 58, 'Конюшня и тренировки', {
      fontFamily: 'Arial', fontSize: '13px', color: '#9fb3c8'
    }).setOrigin(0.5);

    const listTop = 102;
    const cardGap = 12;
    const cardH = Math.max(112, Math.min(128, (h - 240) / 3));
    const cardW = w - 24;

    horses.slice(0, 4).forEach((horse, index) => {
      const x = 12;
      const y = listTop + index * (cardH + cardGap);

      this.add.rectangle(x, y, cardW, cardH, 0x14283d, 0.98)
        .setOrigin(0, 0)
        .setStrokeStyle(1, 0x284b68);

      this.add.image(x + 45, y + 48, 'horse_icon').setDisplaySize(58, 58);

      this.add.text(x + 82, y + 12, horse.name, {
        fontFamily: 'Arial', fontSize: '19px', fontStyle: 'bold', color: '#ffffff'
      });

      this.add.text(x + 82, y + 36, 'Характер: ' + horse.temperament, {
        fontFamily: 'Arial', fontSize: '12px', color: '#adc0d2'
      });

      this.drawBar(x + 82, y + 58, cardW - 190, 'Скорость', horse.speed, 0x2ecc71);
      this.drawBar(x + 82, y + 76, cardW - 190, 'Вынослив.', horse.stamina, 0x3498db);
      this.drawBar(x + 82, y + 94, cardW - 190, 'Ускор.', horse.acceleration, 0xf1c40f);

      const train = this.add.text(x + cardW - 58, y + cardH - 30, 'Трен.', {
        fontFamily: 'Arial', fontSize: '13px', color: '#ffffff', backgroundColor: '#3f51b5', padding: { x: 8, y: 5 }
      }).setOrigin(0.5).setInteractive({ useHandCursor: true });

      train.on('pointerdown', () => {
        this.trainHorse(horse);
      });
    });

    const breedBtn = this.makeButton(w / 2, h - 104, 'Скрестить первых 2 лошадей', 0x00897b, () => {
      this.breedFirstTwo();
    });

    const raceBtn = this.makeButton(w / 2, h - 54, 'Запустить гонку', 0xe91e63, () => {
      this.scene.start('RaceScene', { horses: horses.slice(0, 5) });
    });
  }

  drawBar(x, y, width, label, value, color) {
    const safeWidth = Math.max(80, width);
    this.add.text(x, y, label, {
      fontFamily: 'Arial', fontSize: '10px', color: '#8fa8bd'
    }).setOrigin(0, 0.5);
    this.add.rectangle(x + 58, y, safeWidth, 7, 0x24384c).setOrigin(0, 0.5);
    this.add.rectangle(x + 58, y, safeWidth * (value / 100), 7, color).setOrigin(0, 0.5);
    this.add.text(x + 64 + safeWidth, y, String(Math.round(value)), {
      fontFamily: 'Arial', fontSize: '10px', color: '#ffffff'
    }).setOrigin(0, 0.5);
  }

  makeButton(x, y, text, color, cb) {
    const btn = this.add.text(x, y, text, {
      fontFamily: 'Arial', fontSize: '17px', fontStyle: 'bold', color: '#ffffff', backgroundColor: '#' + color.toString(16).padStart(6, '0'), padding: { x: 18, y: 11 }
    }).setOrigin(0.5).setInteractive({ useHandCursor: true });
    btn.on('pointerdown', cb);
    return btn;
  }

  trainHorse(horse) {
    if (horse.potential <= 0 || horse.energy <= 0) return;
    const keys = ['speed', 'stamina', 'acceleration'];
    const key = keys[randInt(0, keys.length - 1)];
    horse[key] = Math.min(100, horse[key] + randInt(1, 4));
    horse.potential = Math.max(0, horse.potential - randInt(1, 3));
    horse.energy = Math.max(0, horse.energy - randInt(4, 9));
    this.renderStable();
  }

  breedFirstTwo() {
    if (horses.length < 2) return;
    const a = horses[0];
    const b = horses[1];
    const foal = {
      id: Date.now() + Math.random().toString(36).slice(2, 8),
      name: 'Жеребёнок ' + (horses.length + 1),
      speed: Math.round((a.speed + b.speed) / 2 + randInt(-4, 4)),
      stamina: Math.round((a.stamina + b.stamina) / 2 + randInt(-4, 4)),
      acceleration: Math.round((a.acceleration + b.acceleration) / 2 + randInt(-4, 4)),
      agility: Math.round((a.agility + b.agility) / 2 + randInt(-4, 4)),
      power: Math.round((a.power + b.power) / 2 + randInt(-4, 4)),
      intelligence: Math.round((a.intelligence + b.intelligence) / 2 + randInt(-4, 4)),
      temperament: Math.random() < 0.5 ? a.temperament : b.temperament,
      potential: 100,
      energy: 100
    };
    horses.push(foal);
    this.renderStable();
  }
}

class RaceScene extends Phaser.Scene {
  constructor() {
    super('RaceScene');
  }

  init(data) {
    this.raceHorses = (data.horses || horses).map(h => ({ ...h }));
    this.raceResults = [];
    this.raceStarted = false;
    this.raceCompleted = false;
  }

  create() {
    const w = this.scale.width;
    const h = this.scale.height;
    this.cameras.main.setBackgroundColor('#82b7df');

    this.add.rectangle(0, 0, w, h, 0x82b7df).setOrigin(0, 0);
    this.add.rectangle(0, h * 0.28, w, h * 0.72, 0x8b5a2b).setOrigin(0, 0);
    this.add.rectangle(0, h * 0.26, w, 18, 0x2e7d32).setOrigin(0, 0);

    this.add.text(w / 2, 26, 'Гонка', {
      fontFamily: 'Arial', fontSize: '24px', fontStyle: 'bold', color: '#ffffff'
    }).setOrigin(0.5);

    const laneTop = h * 0.34;
    const laneAreaH = h * 0.48;
    const laneH = laneAreaH / this.raceHorses.length;
    this.startX = 40;
    this.finishX = w - 42;

    const g = this.add.graphics();
    g.lineStyle(2, 0xffffff, 0.8);
    for (let i = 0; i <= this.raceHorses.length; i++) {
      const y = laneTop + i * laneH;
      g.lineBetween(0, y, w, y);
    }

    this.add.rectangle(this.finishX, laneTop - 8, 7, laneAreaH + 16, 0xffffff).setOrigin(0.5);
    this.add.text(this.finishX + 14, laneTop - 24, 'ФИНИШ', {
      fontFamily: 'Arial', fontSize: '14px', color: '#ffffff', fontStyle: 'bold'
    }).setOrigin(0.5).setRotation(Math.PI / 2);

    this.sprites = [];
    this.raceHorses.forEach((horse, i) => {
      const y = laneTop + laneH * (i + 0.5);
      const number = this.add.text(10, y, String(i + 1), {
        fontFamily: 'Arial', fontSize: '18px', fontStyle: 'bold', color: '#ffffff', backgroundColor: '#1e88e5', padding: { x: 8, y: 4 }
      }).setOrigin(0, 0.5);
      const sprite = this.add.sprite(this.startX, y, 'horse_run').setOrigin(0.5).setScale(1.18);
      sprite.play('run');
      sprite.horseData = horse;
      sprite.finishTime = null;
      this.sprites.push(sprite);
      this.add.text(48, y + 28, horse.name, {
        fontFamily: 'Arial', fontSize: '11px', color: '#ffffff'
      });
    });

    this.countdown = 3;
    this.countText = this.add.text(w / 2, h / 2, '3', {
      fontFamily: 'Arial', fontSize: '66px', fontStyle: 'bold', color: '#ffffff', stroke: '#000000', strokeThickness: 5
    }).setOrigin(0.5);

    try { this.beep = this.sound.add('beep'); } catch (e) { this.beep = null; }

    this.time.addEvent({ delay: 800, repeat: 3, callback: () => {
      if (this.countdown > 0) {
        this.countText.setText(String(this.countdown));
        try { this.beep && this.beep.play(); } catch(e) {}
        this.countdown--;
      } else {
        this.countText.setText('СТАРТ!');
        try { this.beep && this.beep.play(); } catch(e) {}
        this.time.delayedCall(450, () => {
          this.countText.setVisible(false);
          this.raceStarted = true;
          this.raceStartTime = this.time.now;
        });
      }
    }});
  }

  update(time, delta) {
    if (!this.raceStarted || this.raceCompleted) return;
    const dt = delta / 1000;

    this.sprites.forEach(sprite => {
      if (sprite.finishTime !== null) return;
      const h = sprite.horseData;
      const speed = 55 + h.speed * 2.1 + h.acceleration * 0.65;
      const staminaFactor = 0.72 + h.stamina / 260;
      const randomness = 0.92 + Math.random() * 0.16;
      sprite.x += speed * staminaFactor * randomness * dt;

      if (sprite.x >= this.finishX) {
        sprite.x = this.finishX;
        sprite.finishTime = time;
        this.raceResults.push({ name: h.name, time: (time - this.raceStartTime) / 1000 });
      }
    });

    if (this.raceResults.length === this.sprites.length) {
      this.endRace();
    }
  }

  endRace() {
    this.raceCompleted = true;
    this.raceResults.sort((a, b) => a.time - b.time);
    const overlay = document.getElementById('overlay');
    let html = '<div class="dialog"><h3>Результаты гонки</h3><ol>';
    this.raceResults.forEach(r => {
      html += '<li>' + r.name + ' — ' + r.time.toFixed(2) + ' с</li>';
    });
    html += '</ol><button id="backStable">Вернуться в конюшню</button></div>';
    overlay.innerHTML = html;
    overlay.style.display = 'flex';
    document.getElementById('backStable').onclick = () => {
      overlay.style.display = 'none';
      this.scene.start('StableScene');
    };
  }
}

const config = {
  type: Phaser.AUTO,
  parent: 'game',
  width: W,
  height: H,
  backgroundColor: '#0b1724',
  scale: {
    mode: Phaser.Scale.RESIZE,
    autoCenter: Phaser.Scale.CENTER_BOTH
  },
  scene: [PreloadScene, StableScene, RaceScene]
};

new Phaser.Game(config);
</script>
</body>
</html>
