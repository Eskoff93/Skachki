<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Скачки — прототип на Phaser 4</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!--
    Этот файл демонстрирует прототип мини‑игры «Скачки», построенный на Phaser 4.
    В нём используется минимальная сцена для отображения карточек лошадей,
    тренировки и простого скрещивания. Код адаптирован под Telegram WebApp: при
    загрузке приложение вызывает tg.ready() и tg.expand() для корректного
    отображения внутри Telegram. Параметры лошадей аналогичны предыдущему
    прототипу, но визуализируются через Phaser: для каждой лошади рисуется
    простая карта с именем, полосами характеристик и кнопкой «Тренировать».
    Кнопка «Скрестить» внизу автоматически создаёт потомка от первых двух
    лошадей (можно улучшить выбор родителей). Этот пример предназначен для
    тестирования концепции и может служить основой для дальнейшей доработки.
  -->
  <style>
    /* Убираем отступы и скрываем полосы прокрутки, чтобы холст Phaser занимал весь экран */
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #f5f5f5;
    }
  </style>
  <!-- Подключаем библиотеку Phaser 4 с CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/4.0.0/phaser.min.js"></script>
</head>
<body>
  <script>
    // Поддержка Telegram WebApp
    (function() {
      if (window.Telegram && window.Telegram.WebApp) {
        try {
          const tg = window.Telegram.WebApp;
          tg.ready();
          tg.expand();
        } catch (e) {
          console.log('Telegram WebApp API unavailable: ', e);
        }
      }
    })();

    // Вспомогательная функция для генерации случайного целого
    function randInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    // Список возможных темпераментов (используется для примера)
    const TEMPERAMENTS = ['Ночная', 'Упрямая', 'Пугливая', 'Быстрая', 'Смелая'];

    // Функция создания лошади
    function createHorse(name) {
      return {
        id: Date.now() + Math.random().toString(36).substr(2, 6),
        name: name,
        speed: randInt(50, 80),
        stamina: randInt(50, 80),
        acceleration: randInt(50, 80),
        agility: randInt(50, 80),
        power: randInt(50, 80),
        intelligence: randInt(50, 80),
        temperament: TEMPERAMENTS[randInt(0, TEMPERAMENTS.length - 1)],
        potential: 100,
        energy: 100
      };
    }

    // Исходный список лошадей
    let horses = [
      createHorse('Буран'),
      createHorse('Молния'),
      createHorse('Ветерок')
    ];

    // Объект для хранения элементов визуализации (чтобы можно было обновлять бары)
    let horseVisuals = {};

    // Конфигурация Phaser 4
    const config = {
      type: Phaser.AUTO,
      backgroundColor: '#f5f5f5',
      // Используем размеры экрана мобильного устройства, но ограничиваем минимальный размер
      width: window.innerWidth,
      height: window.innerHeight,
      scene: {
        preload: preload,
        create: create,
        update: update
      },
      // Выключаем отступы вокруг холста
      dom: {
        createContainer: true
      }
    };

    const game = new Phaser.Game(config);

    function preload() {
      // Загружаем изображение лошади (иконка Twemoji) — подойдёт временно
      this.load.image('horse', 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f40e.png');
    }

    function create() {
      const scene = this;
      // Контейнер для карточек лошадей
      scene.horsesContainer = scene.add.container(0, 0);
      // Добавляем кнопку «Скрестить» в нижней части экрана
      const breedButton = scene.add.text(
        scene.game.config.width / 2,
        scene.game.config.height - 50,
        'Скрестить',
        { fontFamily: 'Arial', fontSize: '20px', color: '#ffffff', backgroundColor: '#2196f3', padding: { x: 10, y: 6 }, align: 'center' }
      ).setOrigin(0.5, 0.5).setInteractive({ useHandCursor: true });
      breedButton.on('pointerdown', () => {
        // Простейшее скрещивание: берём первых двух лошадей из списка
        if (horses.length < 2) return;
        const parent1 = horses[0];
        const parent2 = horses[1];
        const foal = {
          id: Date.now() + Math.random().toString(36).substr(2, 6),
          name: 'Жеребёнок ' + (horses.length + 1),
          speed: (parent1.speed + parent2.speed) / 2 + randInt(-3, 3),
          stamina: (parent1.stamina + parent2.stamina) / 2 + randInt(-3, 3),
          acceleration: (parent1.acceleration + parent2.acceleration) / 2 + randInt(-3, 3),
          agility: (parent1.agility + parent2.agility) / 2 + randInt(-3, 3),
          power: (parent1.power + parent2.power) / 2 + randInt(-3, 3),
          intelligence: (parent1.intelligence + parent2.intelligence) / 2 + randInt(-3, 3),
          temperament: Math.random() < 0.5 ? parent1.temperament : parent2.temperament,
          potential: Math.floor((parent1.potential + parent2.potential) / 2),
          energy: 100
        };
        // Ограничиваем характеристики 10–100
        ['speed','stamina','acceleration','agility','power','intelligence'].forEach(stat => {
          foal[stat] = Math.min(100, Math.max(10, Math.round(foal[stat])));
        });
        horses.push(foal);
        // Обновляем отображение
        renderHorses(scene);
      });
      // Первая отрисовка лошадей
      renderHorses(scene);
    }

    function update() {
      // В этом прототипе логика игры обновляется только при событиях, так что
      // метод update может быть пустым
    }

    // Функция отрисовки всех лошадей
    function renderHorses(scene) {
      // Очищаем контейнер перед перерисовкой
      if (scene.horsesContainer) {
        scene.horsesContainer.removeAll(true);
      }
      horseVisuals = {};
      const cardPadding = 10;
      const cardHeight = 110;
      const cardWidth = scene.game.config.width - 2 * cardPadding;
      horses.forEach((horse, index) => {
        const y = cardPadding + index * (cardHeight + cardPadding);
        // Фон карточки
        const bg = scene.add.rectangle(cardPadding, y, cardWidth, cardHeight, 0xffffff, 1).setOrigin(0,0).setStrokeStyle(1, 0xd0d0d0);
        // Изображение лошади
        const imgSize = 64;
        const img = scene.add.image(cardPadding + 10 + imgSize / 2, y + imgSize / 2 + 10, 'horse').setDisplaySize(imgSize, imgSize);
        // Имя
        const nameText = scene.add.text(cardPadding + 20 + imgSize, y + 8, horse.name, { fontFamily: 'Arial', fontSize: '18px', color: '#333' });
        // Функция для создания полосы
        function createBar(label, value, posIndex) {
          // Координаты для подписи и полосы
          const barX = cardPadding + 20 + imgSize;
          const barY = y + 30 + posIndex * 15;
          const labelText = scene.add.text(barX, barY, label + ':', {
            fontFamily: 'Arial', fontSize: '12px', color: '#555'
          }).setOrigin(0, 0.5);
          // Ширина полосы зависит от ширины карточки
          const barWidth = cardWidth - (barX - cardPadding) - 80;
          const barBg = scene.add.rectangle(barX + 50, barY, barWidth, 6, 0xe0e0e0).setOrigin(0, 0.5);
          const barFill = scene.add.rectangle(barX + 50, barY, barWidth * (value / 100), 6, 0x4caf50).setOrigin(0, 0.5);
          // Добавляем подпись и фон полосы в контейнер, чтобы они удалялись при перерисовке
          scene.horsesContainer.add([labelText, barBg, barFill]);
          return { barFill, barWidth };
        }
        // Создаём бары характеристик
        const bars = {};
        const statNames = ['speed','stamina','acceleration','agility','power','intelligence','potential','energy'];
        statNames.forEach((stat, idx) => {
          const labelMap = {
            speed: 'Скорость',
            stamina: 'Вынослив.',
            acceleration: 'Ускорение',
            agility: 'Манёврен.',
            power: 'Сила',
            intelligence: 'Интеллект',
            potential: 'Потенц.',
            energy: 'Энергия'
          };
          const { barFill } = createBar(labelMap[stat], horse[stat], idx);
          bars[stat] = barFill;
        });
        // Кнопка «Тренировать»
        const trainBtn = scene.add.text(
          cardPadding + cardWidth - 70,
          y + cardHeight - 30,
          'Трен.',
          {
            fontFamily: 'Arial', fontSize: '14px', color: '#ffffff', backgroundColor: '#4caf50', padding: { x: 6, y: 4 }
          }
        ).setOrigin(0.5, 0.5).setInteractive({ useHandCursor: true });
        trainBtn.on('pointerdown', () => {
          trainHorse(horse, scene);
        });
        // Сохраняем визуальные элементы для последующего обновления
        horseVisuals[horse.id] = { bars };
        // Добавляем все элементы в контейнер, чтобы они удалялись вместе
        scene.horsesContainer.add([bg, img, nameText, trainBtn]);
        // Также добавляем бары отдельно, потому что они не входят в контейнер на момент создания
        statNames.forEach(stat => {
          scene.horsesContainer.add(horseVisuals[horse.id].bars[stat]);
        });
      });
    }

    // Функция тренировки: увеличивает случайную характеристику и уменьшает потенциал/энергию
    function trainHorse(horse, scene) {
      if (horse.energy <= 0 || horse.potential <= 0) {
        alert('Лошадь устала или исчерпала потенциал.');
        return;
      }
      const stats = ['speed','stamina','acceleration','agility','power','intelligence'];
      const stat = stats[randInt(0, stats.length - 1)];
      const gain = Math.min(randInt(1, 3), horse.potential);
      horse[stat] += gain;
      horse.potential -= gain;
      horse.energy = Math.max(0, horse.energy - randInt(5, 15));
      // Обновляем показатели (ограничиваем верхний предел 100)
      if (horse[stat] > 100) horse[stat] = 100;
      updateHorseDisplay(horse, scene);
    }

    // Обновление полос характеристик для одной лошади
    function updateHorseDisplay(horse, scene) {
      // В данном прототипе для упрощения мы перерисовываем все карточки при изменении характеристик.
      // Это избавляет от необходимости хранить ширину каждой полосы и пересчитывать её вручную.
      renderHorses(scene);
    }
  </script>
</body>
</html>
